<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Termin buchen — GiGi Beauty</title>
<meta name="description" content="Buche deinen Termin bei GiGi Beauty online. Einfach, schnell und unkompliziert.">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/global.css">
<link rel="stylesheet" href="../assets/css/pages/nav.css">
<style>
  .page-hero {
    min-height: 45vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: calc(var(--nav-height) + var(--space-lg)) var(--space-md) var(--space-lg);
    background: radial-gradient(ellipse at 50% 0%, #2a0a2a 0%, var(--black) 70%);
  }
  .page-hero h1 { color: var(--gold); }

  .booking-wrapper {
    max-width: 680px;
    margin: 0 auto;
  }

  /* Inline booking widget placeholder */
  .booking-widget {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(212,175,106,0.15);
    border-radius: 4px;
    padding: var(--space-lg);
    text-align: center;
    color: var(--text-muted);
    font-size: 0.9rem;
    letter-spacing: 0.1em;
  }
  .booking-widget strong { color: var(--gold); display: block; margin-bottom: var(--space-sm); font-family: var(--font-serif); font-size: 1.1rem; }

  /* Manual booking form */
  .booking-form label {
    display: block;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 6px;
    margin-top: var(--space-sm);
  }
  .booking-form select,
  .booking-form input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(212,175,106,0.2);
    border-radius: 2px;
    padding: 12px 16px;
    color: var(--gold-light);
    font-family: var(--font-body);
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s ease;
    appearance: none;
  }
  .booking-form select:focus,
  .booking-form input:focus { border-color: rgba(212,175,106,0.6); }
  .booking-form select option { background: #1a0a1a; }
  .booking-form .btn { margin-top: var(--space-md); width: 100%; }
</style>
</head>
<body>

<nav id="site-nav">
  <a class="nav-logo" href="/">GiGi Beauty</a>
  <ul class="nav-links">
    <li><a href="/pages/services/">Leistungen</a></li>
    <li><a href="/pages/galerie.html">Galerie</a></li>
    <li><a href="/pages/ueber-uns.html">Über uns</a></li>
    <li><a href="/pages/kontakt.html">Kontakt</a></li>
  </ul>
  <a class="nav-cta" href="/pages/booking.html">Termin buchen</a>
</nav>

<section class="page-hero">
  <h1>Termin buchen</h1>
  <div class="divider"></div>
  <p style="color: var(--text-muted); letter-spacing: 0.12em;">Wähle deine Wunschleistung und deinen Wunschtermin</p>
</section>

<main class="container section">
  <div class="booking-wrapper fade-in">

    <!--
      OPTION A: Online-Buchungssystem einbinden (z.B. Treatwell, Booksy, SimplyBook)
      Den Embed-Code des Buchungssystems hier einfügen:

      <div class="booking-widget">
        <strong>Online Terminbuchung</strong>
        Buchungssystem wird hier eingebettet.<br>
        (Treatwell / Booksy / SimplyBook Embed-Code hier einfügen)
      </div>
    -->

    <!-- OPTION B: Einfaches Anfrage-Formular -->
    <form class="booking-form" action="#" method="post">

      <label for="service">Leistung</label>
      <select id="service" name="service" required>
        <option value="" disabled selected>Bitte wählen…</option>
        <option value="kuenstliche-wimpern">Künstliche Wimpern</option>
        <option value="wimpern-lifting">Wimpern Lifting</option>
        <option value="augenbrauen-tattoo">Augenbrauen Tattoo</option>
        <option value="augenbrauen-styling">Augenbrauen Styling</option>
        <option value="microblading">Microblading</option>
        <option value="gelnaegel">Gelnägel</option>
        <option value="nail-art">Nail Art</option>
        <option value="make-up">Make-up</option>
      </select>

      <label for="bdate">Wunschdatum</label>
      <input type="date" id="bdate" name="date" required>

      <label for="btime">Wunschzeit</label>
      <input type="time" id="btime" name="time" required>

      <label for="bname">Name</label>
      <input type="text" id="bname" name="name" required placeholder="Dein Name">

      <label for="bemail">E-Mail</label>
      <input type="email" id="bemail" name="email" required placeholder="deine@email.ch">

      <label for="bphone">Telefon</label>
      <input type="tel" id="bphone" name="phone" placeholder="+41 79 000 00 00">

      <button type="submit" class="btn">Anfrage senden</button>
    </form>

  </div>
</main>

<footer id="site-footer">
  <div class="footer-logo">GiGi Beauty</div>
  <p class="footer-tagline">Luxury Beauty Studio · Zürich</p>
  <ul class="footer-links">
    <li><a href="/pages/services/">Leistungen</a></li>
    <li><a href="/pages/galerie.html">Galerie</a></li>
    <li><a href="/pages/ueber-uns.html">Über uns</a></li>
    <li><a href="/pages/kontakt.html">Kontakt</a></li>
    <li><a href="/pages/booking.html">Termin buchen</a></li>
  </ul>
  <p class="footer-copy">© 2025 GiGi Beauty · www.gigibeauty.ch</p>
</footer>

<script src="../assets/js/main.js"></script>
</body>
</html>
